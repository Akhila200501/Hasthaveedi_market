# HasthaVeedhi Blueprint
services:
  - type: web
    name: Hasthaveedi_market
    env: node
    buildCommand: npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false
      - key: GEMINI_API_KEY
        sync: false
